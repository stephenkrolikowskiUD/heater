<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Around the Horn</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0d0d0d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const INNINGS = [
      {
        number: 1, category: "K King", emoji: "\u{1F525}",
        description: "Which pitcher records the most strikeouts tonight?",
        type: "pick1of3",
        options: [
          { name: "Jacob Misiorowski", team: "MIL", detail: "vs BOS \u2022 18 K in 11 IP this season \u2022 Elite swing-and-miss stuff" },
          { name: "Garrett Crochet", team: "BOS", detail: "vs MIL \u2022 15 K in 11 IP \u2022 High-K duel at Fenway" },
          { name: "Gavin Williams", team: "CLE", detail: "vs KC \u2022 10 K last start vs LAD \u2022 Shut out Dodgers thru 7 IP" }
        ]
      },
      {
        number: 2, category: "Gone Yard", emoji: "\u{1F4A3}",
        description: "Over/Under on total HRs across tonight's 15-game slate?",
        type: "overunder", line: 18.5,
        context: "HOU @ COL at Coors Field \u2022 Astros lead MLB in OPS \u2022 Wind blowing out in Chicago"
      },
      {
        number: 3, category: "Speed Demon", emoji: "\u26A1",
        description: "Will there be a stolen base in the first 3 innings?",
        type: "yesno", game: "LAD @ TOR \u2022 World Series rematch",
        context: "Dodgers 8-2, lead NL West \u2022 Won 14-2 last night \u2022 Dodgers have been aggressive on the bases"
      },
      {
        number: 4, category: "RBI Machine", emoji: "\u{1F4AA}",
        description: "Which batter drives in the most runs tonight?",
        type: "pick1of3",
        options: [
          { name: "Yordan Alvarez", team: "HOU", detail: "@ COL \u2022 Astros 1st in hits & runs \u2022 Coors Field + healthy Yordan = damage" },
          { name: "Shohei Ohtani", team: "LAD", detail: "@ TOR \u2022 Dodgers 1st in BA, SLG & HR \u2022 LAD scored 14 runs last night" },
          { name: "Jose Ramirez", team: "CLE", detail: "vs KC \u2022 Just set franchise record: 1,620 career games \u2022 Heart of CLE lineup" }
        ]
      },
      {
        number: 5, category: "Pitcher's Duel", emoji: "\u{1F910}",
        description: "Which game has the lowest combined score?",
        type: "pick1of3",
        options: [
          { name: "DET @ MIN", team: "", detail: "Skubal vs Bradley \u2022 Skubal: 0.69 ERA, 1 ER in 13 IP \u2022 Bradley: 1 ER in 10.1 IP" },
          { name: "SD @ PIT", team: "", detail: "Pivetta vs Skenes \u2022 Both bounced back after rough openers \u2022 PNC Park pitcher-friendly" },
          { name: "KC @ CLE", team: "", detail: "Cameron vs Williams \u2022 Lowest O/U on slate \u2022 Freezing temps in Cleveland" }
        ]
      },
      {
        number: 6, category: "Extra Bases", emoji: "\u{1F3C3}",
        description: "Which batter has the most total bases tonight?",
        type: "pick1of3",
        options: [
          { name: "Vladimir Guerrero Jr.", team: "TOR", detail: "vs LAD \u2022 Getting on base consistently \u2022 WS rematch motivation at Rogers Centre" },
          { name: "Adolis Garcia", team: "PHI", detail: "@ SF \u2022 .835 OPS, 2nd on PHI \u2022 Change of scenery working so far" },
          { name: "Colt Keith", team: "DET", detail: "@ MIN \u2022 Surprise OPS leader for Tigers \u2022 Emerging breakout candidate" }
        ]
      },
      {
        number: 7, category: "First Blood", emoji: "\u{1FA78}",
        description: "Which game has a run scored first?",
        type: "pick1of3",
        options: [
          { name: "HOU @ COL", team: "", detail: "Coors Field \u2022 Astros 1st in MLB in runs \u2022 Burrows allowing heavy traffic (14 H, 5 BB in 10.2 IP)" },
          { name: "LAD @ TOR", team: "", detail: "Dodgers scored early & often last night \u2022 Yamamoto vs Gausman \u2022 7:07 PM ET" },
          { name: "MIL @ BOS", team: "", detail: "Misiorowski vs Crochet \u2022 High-K but both can be wild early \u2022 Fenway factor" }
        ]
      },
      {
        number: 8, category: "Iron Man", emoji: "\u{1F6E1}",
        description: "Which starter goes the deepest tonight?",
        type: "pick1of3",
        options: [
          { name: "Sandy Alcantara", team: "MIA", detail: "vs CIN \u2022 0.00 ERA thru 16 IP \u2022 1.45 xERA \u2022 Elite workhorse" },
          { name: "Cam Schlittler", team: "NYY", detail: "vs OAK \u2022 0 runs in 11.2 IP \u2022 Dominant start to career \u2022 Weak A's lineup" },
          { name: "Tarik Skubal", team: "DET", detail: "@ MIN \u2022 0.69 ERA, 1 ER in 13 IP \u2022 Reigning Cy Young \u2022 Always goes deep" }
        ]
      },
      {
        number: 9, category: "The Closer", emoji: "\u{1F6AA}",
        description: "Do the Braves bullpen convert the save tonight?",
        type: "yesno", game: "ATL @ LAA \u2022 9:38 PM ET",
        context: "Braves: Lowest ERA in MLB (1.82) \u2022 Best bullpen ERA (1.08) \u2022 Angels struggling at 3-7"
      }
    ];

    const PAYOUTS = { 5: "1x (Break Even)", 6: "2x", 7: "5x", 8: "15x", 9: "50x \u{1F3C6}" };

    function AroundTheHorn() {
      const [screen, setScreen] = useState("splash");
      const [currentInning, setCurrentInning] = useState(0);
      const [picks, setPicks] = useState({});
      const [selectedOption, setSelectedOption] = useState(null);
      const [locked, setLocked] = useState(false);
      const [animatingOut, setAnimatingOut] = useState(false);
      const [results, setResults] = useState(null);

      const inning = INNINGS[currentInning];

      const lockPick = () => {
        if (selectedOption === null) return;
        setPicks(prev => ({ ...prev, [currentInning]: selectedOption }));
        setLocked(true);
      };

      const nextInning = () => {
        if (animatingOut) return;
        if (currentInning < 8) {
          setAnimatingOut(true);
          setTimeout(() => {
            setCurrentInning(prev => prev + 1);
            setSelectedOption(null);
            setLocked(false);
            setAnimatingOut(false);
          }, 300);
        } else {
          const correct = Math.floor(Math.random() * 5) + 5;
          setResults(correct);
          setScreen("results");
        }
      };

      const reset = () => {
        setScreen("splash");
        setCurrentInning(0);
        setPicks({});
        setSelectedOption(null);
        setLocked(false);
        setResults(null);
        setAnimatingOut(false);
      };

      if (screen === "splash") {
        return (
          <div style={styles.container}>
            <div style={styles.splashContent}>
              <div style={styles.diamondIcon}>
                <svg width="120" height="120" viewBox="0 0 120 120">
                  <g transform="translate(60,15)">
                    <polygon points="0,0 45,40 0,80 -45,40" fill="none" stroke="#f59e0b" strokeWidth="2.5" />
                    <circle cx="0" cy="0" r="6" fill="#f59e0b" />
                    <circle cx="45" cy="40" r="6" fill="#f59e0b" />
                    <circle cx="0" cy="80" r="6" fill="#f59e0b" />
                    <circle cx="-45" cy="40" r="6" fill="#f59e0b" />
                    <circle cx="0" cy="35" r="4" fill="#ef4444" opacity="0.9" />
                  </g>
                </svg>
              </div>
              <h1 style={styles.splashTitle}>Around the Horn</h1>
              <p style={styles.splashSub}>9 Innings. 9 Picks. One Shot.</p>
              <p style={{fontSize: 12, color: "#f59e0b", margin: "0 0 12px", fontWeight: 600}}>Tuesday, April 7 \u2022 15 Games</p>
              <div style={styles.splashRules}>
                <p style={styles.ruleText}>Work your way around the diamond \u2014 one inning at a time. Each inning is a different prop category. You can't see what's next until you lock in.</p>
                <div style={styles.payoutPreview}>
                  <div style={styles.payoutRow}><span style={styles.payoutLabel}>5/9</span><span style={styles.payoutVal}>1x</span></div>
                  <div style={styles.payoutRow}><span style={styles.payoutLabel}>6/9</span><span style={styles.payoutVal}>2x</span></div>
                  <div style={styles.payoutRow}><span style={styles.payoutLabel}>7/9</span><span style={styles.payoutVal}>5x</span></div>
                  <div style={styles.payoutRow}><span style={styles.payoutLabel}>8/9</span><span style={styles.payoutVal}>15x</span></div>
                  <div style={styles.payoutRow}><span style={{...styles.payoutLabel, color: "#f59e0b"}}>9/9</span><span style={{...styles.payoutVal, color: "#f59e0b"}}>50x \u{1F3C6}</span></div>
                </div>
              </div>
              <button style={styles.playBtn} onClick={() => setScreen("game")}>Play \u2014 $5 Entry</button>
            </div>
          </div>
        );
      }

      if (screen === "results") {
        const correctSet = new Set();
        while (correctSet.size < results) {
          correctSet.add(Math.floor(Math.random() * 9));
        }
        return (
          <div style={styles.container}>
            <div style={styles.resultsContent}>
              <h2 style={styles.resultsTitle}>
                {results === 9 ? "\u{1F3C6} PERFECT GAME \u{1F3C6}" : results >= 7 ? "\u{1F525} Great Round!" : results >= 5 ? "Solid Night" : "Tough Break"}
              </h2>
              <div style={styles.scoreCircle}>
                <span style={styles.scoreNum}>{results}</span>
                <span style={styles.scoreOf}>/9</span>
              </div>
              {results >= 5 && (
                <div style={styles.payoutBadge}>
                  <span style={styles.payoutBadgeText}>{PAYOUTS[results]}</span>
                </div>
              )}
              <div style={styles.resultsGrid}>
                {INNINGS.map((inn, i) => {
                  const hit = correctSet.has(i);
                  return (
                    <div key={i} style={{
                      ...styles.resultInning,
                      borderColor: hit ? "#22c55e" : "#ef4444",
                      background: hit ? "rgba(34,197,94,0.1)" : "rgba(239,68,68,0.08)"
                    }}>
                      <span style={styles.resultEmoji}>{inn.emoji}</span>
                      <span style={styles.resultCat}>{inn.category}</span>
                      <span style={{ color: hit ? "#22c55e" : "#ef4444", fontWeight: 700, fontSize: 14 }}>
                        {hit ? "\u2713" : "\u2717"}
                      </span>
                    </div>
                  );
                })}
              </div>
              <button style={styles.playBtn} onClick={reset}>Play Again</button>
            </div>
          </div>
        );
      }

      return (
        <div style={styles.container}>
          <div style={styles.progressBar}>
            {INNINGS.map((_, i) => (
              <div key={i} style={{
                ...styles.progressDot,
                background: i < currentInning ? "#f59e0b" : i === currentInning ? "#fff" : "#333",
                border: i === currentInning ? "2px solid #f59e0b" : "2px solid transparent",
                transform: i === currentInning ? "scale(1.3)" : "scale(1)"
              }}>
                {i < currentInning && <span style={{fontSize: 8, color: "#000"}}>{"\u2713"}</span>}
              </div>
            ))}
          </div>

          <div style={{
            ...styles.inningCard,
            opacity: animatingOut ? 0 : 1,
            transform: animatingOut ? "translateX(-40px)" : "translateX(0)",
            transition: "all 0.3s ease"
          }}>
            <div style={styles.inningHeader}>
              <span style={styles.inningNum}>Inning {inning.number}</span>
              <span style={styles.inningCategory}>{inning.emoji} {inning.category}</span>
            </div>
            <p style={styles.inningDesc}>{inning.description}</p>
            {(inning.game || inning.context) && (
              <p style={styles.contextText}>
                {[inning.game, inning.context].filter(Boolean).join(" \u2022 ")}
              </p>
            )}

            <div style={styles.optionsWrap}>
              {inning.type === "pick1of3" && inning.options.map((opt, i) => (
                <button key={i} disabled={locked} onClick={() => setSelectedOption(i)}
                  style={{
                    ...styles.optionBtn,
                    borderColor: selectedOption === i ? "#f59e0b" : "#333",
                    background: selectedOption === i ? "rgba(245,158,11,0.12)" : "#1a1a1a",
                    opacity: locked && selectedOption !== i ? 0.4 : 1
                  }}>
                  <div style={styles.optionTop}>
                    <span style={styles.optionName}>{opt.name}</span>
                    {opt.team && <span style={styles.optionTeam}>{opt.team}</span>}
                  </div>
                  <span style={styles.optionDetail}>{opt.detail}</span>
                </button>
              ))}

              {inning.type === "overunder" && (
                <div style={styles.ouWrap}>
                  <p style={styles.ouLine}>Line: {inning.line}</p>
                  <div style={styles.ouBtns}>
                    <button disabled={locked} onClick={() => setSelectedOption("over")}
                      style={{...styles.ouBtn, borderColor: selectedOption === "over" ? "#22c55e" : "#333", background: selectedOption === "over" ? "rgba(34,197,94,0.12)" : "#1a1a1a", opacity: locked && selectedOption !== "over" ? 0.4 : 1}}>
                      <span style={{fontSize: 22}}>{"\u2B06\uFE0F"}</span>
                      <span style={styles.ouLabel}>Over {inning.line}</span>
                    </button>
                    <button disabled={locked} onClick={() => setSelectedOption("under")}
                      style={{...styles.ouBtn, borderColor: selectedOption === "under" ? "#ef4444" : "#333", background: selectedOption === "under" ? "rgba(239,68,68,0.1)" : "#1a1a1a", opacity: locked && selectedOption !== "under" ? 0.4 : 1}}>
                      <span style={{fontSize: 22}}>{"\u2B07\uFE0F"}</span>
                      <span style={styles.ouLabel}>Under {inning.line}</span>
                    </button>
                  </div>
                </div>
              )}

              {inning.type === "yesno" && (
                <div style={styles.ouWrap}>
                  <div style={styles.ouBtns}>
                    <button disabled={locked} onClick={() => setSelectedOption("yes")}
                      style={{...styles.ouBtn, borderColor: selectedOption === "yes" ? "#22c55e" : "#333", background: selectedOption === "yes" ? "rgba(34,197,94,0.12)" : "#1a1a1a", opacity: locked && selectedOption !== "yes" ? 0.4 : 1}}>
                      <span style={{fontSize: 22}}>{"\u2705"}</span>
                      <span style={styles.ouLabel}>Yes</span>
                    </button>
                    <button disabled={locked} onClick={() => setSelectedOption("no")}
                      style={{...styles.ouBtn, borderColor: selectedOption === "no" ? "#ef4444" : "#333", background: selectedOption === "no" ? "rgba(239,68,68,0.1)" : "#1a1a1a", opacity: locked && selectedOption !== "no" ? 0.4 : 1}}>
                      <span style={{fontSize: 22}}>{"\u274C"}</span>
                      <span style={styles.ouLabel}>No</span>
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>

          <div style={styles.actionWrap}>
            {!locked ? (
              <button style={{...styles.lockBtn, opacity: selectedOption === null ? 0.4 : 1, cursor: selectedOption === null ? "default" : "pointer"}}
                disabled={selectedOption === null} onClick={lockPick}>
                Lock It In {"\u{1F512}"}
              </button>
            ) : (
              <button style={{...styles.nextBtn, opacity: animatingOut ? 0.6 : 1, cursor: animatingOut ? "default" : "pointer"}}
                disabled={animatingOut} onClick={nextInning}>
                {currentInning < 8 ? `Inning ${currentInning + 2} \u2192` : "See Results \u{1F3C6}"}
              </button>
            )}
          </div>
        </div>
      );
    }

    const styles = {
      container: { minHeight: "100vh", background: "#0d0d0d", color: "#fff", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", maxWidth: 430, margin: "0 auto", padding: "16px 16px 100px", position: "relative", overflowX: "hidden" },
      splashContent: { display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 40, gap: 8 },
      diamondIcon: { marginBottom: 8 },
      splashTitle: { fontSize: 32, fontWeight: 800, margin: 0, letterSpacing: "-0.5px" },
      splashSub: { fontSize: 16, color: "#999", margin: "4px 0 4px", fontWeight: 500 },
      splashRules: { background: "#1a1a1a", borderRadius: 14, padding: "18px 20px", width: "100%", maxWidth: 360 },
      ruleText: { fontSize: 14, lineHeight: "1.5", color: "#bbb", margin: "0 0 16px" },
      payoutPreview: { display: "flex", flexDirection: "column", gap: 6 },
      payoutRow: { display: "flex", justifyContent: "space-between", padding: "4px 0" },
      payoutLabel: { fontSize: 14, color: "#888", fontWeight: 600 },
      payoutVal: { fontSize: 14, color: "#fff", fontWeight: 700 },
      playBtn: { marginTop: 24, background: "#f59e0b", color: "#000", border: "none", borderRadius: 12, padding: "16px 48px", fontSize: 17, fontWeight: 700, cursor: "pointer", width: "100%", maxWidth: 360 },
      progressBar: { display: "flex", justifyContent: "center", gap: 8, padding: "8px 0 20px", alignItems: "center" },
      progressDot: { width: 20, height: 20, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.3s ease" },
      inningCard: { background: "#141414", borderRadius: 16, padding: "20px 18px", border: "1px solid #222" },
      inningHeader: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 },
      inningNum: { fontSize: 13, color: "#666", fontWeight: 600, textTransform: "uppercase", letterSpacing: "1px" },
      inningCategory: { fontSize: 16, fontWeight: 700, color: "#f59e0b" },
      inningDesc: { fontSize: 17, fontWeight: 600, lineHeight: "1.4", margin: "0 0 8px", color: "#eee" },
      contextText: { fontSize: 13, color: "#777", margin: "0 0 18px", lineHeight: "1.4" },
      optionsWrap: { display: "flex", flexDirection: "column", gap: 10 },
      optionBtn: { width: "100%", textAlign: "left", border: "2px solid #333", borderRadius: 12, padding: "14px 16px", cursor: "pointer", transition: "all 0.2s ease", display: "flex", flexDirection: "column", gap: 4 },
      optionTop: { display: "flex", justifyContent: "space-between", alignItems: "center" },
      optionName: { fontSize: 16, fontWeight: 700, color: "#fff" },
      optionTeam: { fontSize: 13, fontWeight: 600, color: "#f59e0b", background: "rgba(245,158,11,0.15)", padding: "2px 8px", borderRadius: 6 },
      optionDetail: { fontSize: 12, color: "#888", lineHeight: "1.3" },
      ouWrap: { display: "flex", flexDirection: "column", gap: 12, alignItems: "center" },
      ouLine: { fontSize: 28, fontWeight: 800, color: "#fff", margin: 0 },
      ouBtns: { display: "flex", gap: 12, width: "100%" },
      ouBtn: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6, padding: "18px 12px", border: "2px solid #333", borderRadius: 12, cursor: "pointer", transition: "all 0.2s ease" },
      ouLabel: { fontSize: 15, fontWeight: 700, color: "#fff" },
      actionWrap: { position: "fixed", bottom: 0, left: 0, right: 0, padding: "16px", background: "linear-gradient(transparent, #0d0d0d 30%)", display: "flex", justifyContent: "center" },
      lockBtn: { background: "#f59e0b", color: "#000", border: "none", borderRadius: 12, padding: "16px 0", fontSize: 17, fontWeight: 700, cursor: "pointer", width: "100%", maxWidth: 400 },
      nextBtn: { background: "#22c55e", color: "#000", border: "none", borderRadius: 12, padding: "16px 0", fontSize: 17, fontWeight: 700, cursor: "pointer", width: "100%", maxWidth: 400 },
      resultsContent: { display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 30, gap: 16 },
      resultsTitle: { fontSize: 24, fontWeight: 800, margin: 0, textAlign: "center" },
      scoreCircle: { width: 100, height: 100, borderRadius: "50%", border: "3px solid #f59e0b", display: "flex", alignItems: "center", justifyContent: "center", gap: 2 },
      scoreNum: { fontSize: 42, fontWeight: 800, color: "#f59e0b" },
      scoreOf: { fontSize: 20, color: "#888", fontWeight: 600, marginTop: 10 },
      payoutBadge: { background: "rgba(245,158,11,0.15)", borderRadius: 10, padding: "8px 20px" },
      payoutBadgeText: { fontSize: 18, fontWeight: 700, color: "#f59e0b" },
      resultsGrid: { width: "100%", maxWidth: 360, display: "flex", flexDirection: "column", gap: 6, marginTop: 8 },
      resultInning: { display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 10, border: "1px solid" },
      resultEmoji: { fontSize: 18 },
      resultCat: { fontSize: 14, fontWeight: 600, color: "#ccc", flex: 1 }
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AroundTheHorn />);
  </script>
</body>
</html>
