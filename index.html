<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heater</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #0d0d0d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const TIERS = {
      3: { label: "Warming Up", color: "#f59e0b", mult: "1.5x", glow: "0 0 8px rgba(245,158,11,0.3)" },
      4: { label: "Warming Up", color: "#f59e0b", mult: "1.8x", glow: "0 0 8px rgba(245,158,11,0.3)" },
      5: { label: "Hot", color: "#f97316", mult: "2.2x", glow: "0 0 12px rgba(249,115,22,0.4)" },
      6: { label: "Hot", color: "#f97316", mult: "2.8x", glow: "0 0 12px rgba(249,115,22,0.4)" },
      7: { label: "On Fire", color: "#ef4444", mult: "3.5x", glow: "0 0 16px rgba(239,68,68,0.5)" },
      8: { label: "On Fire", color: "#ef4444", mult: "4.5x", glow: "0 0 16px rgba(239,68,68,0.5)" },
      9: { label: "Scorching", color: "#dc2626", mult: "6x", glow: "0 0 20px rgba(220,38,38,0.6)" },
      10: { label: "Scorching", color: "#dc2626", mult: "8x", glow: "0 0 20px rgba(220,38,38,0.6)" }
    };

    const STREAKS = [
      { name: "Andy Pages", team: "LAD", opp: "@ TOR", streak: 8, avg: ".471", detail: "16-for-34 \u2022 3 HR \u2022 Best hitter on Dodgers so far \u2022 Bounced back from rough postseason", tonight: "vs Kevin Gausman (20.3% SwStr rate)" },
      { name: "Andres Gimenez", team: "CLE", opp: "vs KC", streak: 7, avg: ".375", detail: "MLB leader in hits \u2022 6 multi-hit games \u2022 Elite contact rate", tonight: "vs Noah Cameron (LHP \u2022 solid debut: 5 IP, 1 ER)" },
      { name: "Yordan Alvarez", team: "HOU", opp: "@ COL", streak: 6, avg: ".341", detail: "HOU leads MLB in OPS, hits & runs \u2022 Healthy Yordan = elite", tonight: "vs Kyle Freeland at Coors Field \u2022 xERA 5.23" },
      { name: "Shea Langeliers", team: "OAK", opp: "@ NYY", streak: 5, avg: ".310", detail: "5 HR in first 6 games \u2022 Tied MLB HR lead \u2022 Historic catching pace", tonight: "vs Cam Schlittler (0 runs in 11.2 IP \u2022 Tough matchup)" },
      { name: "Jose Ramirez", team: "CLE", opp: "vs KC", streak: 5, avg: ".333", detail: "Franchise record: 1,620 career games \u2022 Heart of CLE lineup", tonight: "vs Noah Cameron \u2022 Most dangerous in this matchup per H2H data" },
      { name: "Colt Keith", team: "DET", opp: "@ MIN", streak: 4, avg: ".320", detail: "Surprise OPS leader for Tigers \u2022 Emerging breakout \u2022 Consistent contact", tonight: "vs Taj Bradley (0.87 ERA \u2022 Tough but K-heavy)" },
      { name: "Vlad Guerrero Jr.", team: "TOR", opp: "vs LAD", streak: 4, avg: ".293", detail: "Getting on base consistently \u2022 WS rematch motivation", tonight: "vs Yoshinobu Yamamoto (3.00 ERA \u2022 8 K in 2 starts)" },
      { name: "Giancarlo Stanton", team: "NYY", opp: "vs OAK", streak: 3, avg: ".400", detail: ".400 BA in 25 PA \u2022 No walks, 5 K \u2022 Surprising hot start", tonight: "vs Aaron Civale (low K rate \u2022 hittable)" },
      { name: "Ian Happ", team: "CHC", opp: "@ TB", streak: 3, avg: ".267", detail: "4 HR already \u2022 Cubs leader in SLG \u2022 Power surge early", tonight: "vs Drew Rasmussen (1 ER in each of 2 starts)" },
      { name: "Mike Trout", team: "LAA", opp: "vs ATL", streak: 3, avg: ".310", detail: "SEA pitched around him all series \u2022 Healthy start to 2026", tonight: "vs Pablo Lopez (2 ER in 11 IP \u2022 Low K rate tho)" }
    ];

    function getTier(streak) {
      if (streak >= 10) return TIERS[10];
      return TIERS[streak] || TIERS[3];
    }

    function FlameBar({ streak, max }) {
      const pct = Math.min((streak / max) * 100, 100);
      const tier = getTier(streak);
      return (
        <div style={{ width: "100%", height: 6, background: "#222", borderRadius: 3, overflow: "hidden" }}>
          <div style={{ width: pct + "%", height: "100%", background: `linear-gradient(90deg, #f59e0b, ${tier.color})`, borderRadius: 3, transition: "width 0.5s ease" }} />
        </div>
      );
    }

    function StreakCard({ player, isExpanded, onToggle, onBet, bet }) {
      const tier = getTier(player.streak);
      const flames = player.streak >= 8 ? "\u{1F525}\u{1F525}\u{1F525}" : player.streak >= 6 ? "\u{1F525}\u{1F525}" : player.streak >= 4 ? "\u{1F525}" : "";

      return (
        <div style={{
          background: "#141414", borderRadius: 14, border: "1px solid #222",
          overflow: "hidden", marginBottom: 10,
          boxShadow: bet ? tier.glow : "none",
          transition: "all 0.3s ease"
        }}>
          <button onClick={onToggle} style={{
            width: "100%", padding: "14px 16px", background: "transparent",
            border: "none", cursor: "pointer", textAlign: "left"
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: "#fff" }}>{player.name}</span>
                <span style={{ fontSize: 11, fontWeight: 600, color: tier.color, background: tier.color + "20", padding: "2px 6px", borderRadius: 4 }}>{player.team}</span>
              </div>
              <span style={{ fontSize: 12, color: "#888" }}>{player.opp}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <span style={{ fontSize: 26, fontWeight: 800, color: tier.color }}>{player.streak}</span>
                <span style={{ fontSize: 12, color: "#888", lineHeight: "1.2" }}>game<br/>streak</span>
                <span style={{ fontSize: 14, marginLeft: 4 }}>{flames}</span>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 11, color: "#666", textTransform: "uppercase", letterSpacing: 0.5 }}>{tier.label}</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: tier.color }}>{tier.mult}</div>
              </div>
            </div>
            <FlameBar streak={player.streak} max={12} />
          </button>

          {isExpanded && (
            <div style={{ padding: "0 16px 14px", borderTop: "1px solid #1a1a1a" }}>
              <p style={{ fontSize: 12, color: "#999", lineHeight: "1.5", margin: "10px 0 4px" }}>{player.detail}</p>
              <p style={{ fontSize: 12, color: "#777", margin: "0 0 12px" }}>{"\u{1F3AF}"} Tonight: {player.tonight}</p>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={(e) => { e.stopPropagation(); onBet("yes"); }}
                  style={{
                    flex: 1, padding: "12px 0", borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: "pointer",
                    border: bet === "yes" ? "2px solid #22c55e" : "2px solid #333",
                    background: bet === "yes" ? "rgba(34,197,94,0.12)" : "#1a1a1a",
                    color: bet === "yes" ? "#22c55e" : "#fff"
                  }}>
                  {"\u{1F525}"} Keeps Rolling
                </button>
                <button onClick={(e) => { e.stopPropagation(); onBet("no"); }}
                  style={{
                    flex: 1, padding: "12px 0", borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: "pointer",
                    border: bet === "no" ? "2px solid #ef4444" : "2px solid #333",
                    background: bet === "no" ? "rgba(239,68,68,0.1)" : "#1a1a1a",
                    color: bet === "no" ? "#ef4444" : "#fff"
                  }}>
                  {"\u{1F9CA}"} Goes Cold
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Heater() {
      const [view, setView] = useState("splash");
      const [expanded, setExpanded] = useState(null);
      const [bets, setBets] = useState({});
      const [filter, setFilter] = useState("all");
      const [showConfirm, setShowConfirm] = useState(false);

      const betCount = Object.keys(bets).length;

      const filteredStreaks = filter === "all" ? STREAKS :
        filter === "hot" ? STREAKS.filter(s => s.streak >= 6) :
        STREAKS.filter(s => s.streak < 6);

      if (view === "splash") {
        return (
          <div style={styles.container}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 40, gap: 10 }}>
              <div style={{ fontSize: 64, lineHeight: 1 }}>{"\u{1F525}"}</div>
              <h1 style={{ fontSize: 32, fontWeight: 800, margin: 0, color: "#fff" }}>Heater</h1>
              <p style={{ fontSize: 15, color: "#999", margin: 0, fontWeight: 500 }}>Ride the Streak. Chase the Payout.</p>
              <p style={{ fontSize: 12, color: "#f59e0b", margin: "4px 0 16px", fontWeight: 600 }}>Tuesday, April 7 {"\u2022"} 15 Games</p>

              <div style={{ background: "#1a1a1a", borderRadius: 14, padding: "16px 20px", width: "100%", maxWidth: 340 }}>
                <p style={{ fontSize: 13, color: "#aaa", lineHeight: "1.5", margin: "0 0 14px" }}>
                  Pick players on active hitting streaks. If they get a hit tonight, the streak continues and you cash out at the multiplier. Longer streaks = bigger payouts.
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {[
                    { range: "3-4 games", label: "Warming Up", mult: "1.5-1.8x", color: "#f59e0b" },
                    { range: "5-6 games", label: "Hot", mult: "2.2-2.8x", color: "#f97316" },
                    { range: "7-8 games", label: "On Fire", mult: "3.5-4.5x", color: "#ef4444" },
                    { range: "9-10+ games", label: "Scorching", mult: "6-8x+", color: "#dc2626" }
                  ].map((t, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", alignItems: "center" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 12, color: "#666", width: 70 }}>{t.range}</span>
                        <span style={{ fontSize: 12, color: t.color, fontWeight: 600 }}>{t.label}</span>
                      </div>
                      <span style={{ fontSize: 13, color: "#fff", fontWeight: 700 }}>{t.mult}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ background: "#1a1a1a", borderRadius: 14, padding: "14px 20px", width: "100%", maxWidth: 340, marginTop: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                  <span style={{ fontSize: 16 }}>{"\u{1F6E1}"}</span>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>Streak Save</span>
                </div>
                <p style={{ fontSize: 12, color: "#888", lineHeight: "1.4", margin: 0 }}>
                  Once per month, protect a streak that dies. Your guy went 0-for-4? Use your save and the streak lives on tomorrow.
                </p>
              </div>

              <button onClick={() => setView("board")} style={{
                marginTop: 20, background: "#f59e0b", color: "#000", border: "none",
                borderRadius: 12, padding: "15px 0", fontSize: 16, fontWeight: 700,
                cursor: "pointer", width: "100%", maxWidth: 340
              }}>
                View Today's Streaks
              </button>
            </div>
          </div>
        );
      }

      if (view === "confirmed") {
        return (
          <div style={styles.container}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 60, gap: 16 }}>
              <div style={{ fontSize: 56, lineHeight: 1 }}>{"\u{1F525}"}</div>
              <h2 style={{ fontSize: 22, fontWeight: 800, margin: 0, textAlign: "center" }}>Bets Locked In!</h2>
              <p style={{ fontSize: 14, color: "#999", textAlign: "center" }}>{betCount} streak{betCount > 1 ? "s" : ""} riding tonight</p>
              <div style={{ width: "100%", maxWidth: 340, display: "flex", flexDirection: "column", gap: 6, marginTop: 8 }}>
                {Object.entries(bets).map(([idx, pick]) => {
                  const p = STREAKS[parseInt(idx)];
                  const tier = getTier(p.streak);
                  return (
                    <div key={idx} style={{
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                      padding: "10px 14px", background: "#141414", borderRadius: 10, border: "1px solid #222"
                    }}>
                      <div>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>{p.name}</span>
                        <span style={{ fontSize: 12, color: "#666", marginLeft: 6 }}>{p.streak}-game streak</span>
                      </div>
                      <div style={{ textAlign: "right" }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: pick === "yes" ? "#22c55e" : "#ef4444" }}>
                          {pick === "yes" ? "Keeps Rolling" : "Goes Cold"}
                        </span>
                        <div style={{ fontSize: 12, color: tier.color, fontWeight: 700 }}>{tier.mult}</div>
                      </div>
                    </div>
                  );
                })}
              </div>
              <p style={{ fontSize: 13, color: "#666", marginTop: 12, textAlign: "center" }}>Results update after tonight's games.</p>
              <button onClick={() => { setView("splash"); setBets({}); setExpanded(null); }} style={{
                marginTop: 16, background: "#333", color: "#fff", border: "none",
                borderRadius: 12, padding: "14px 0", fontSize: 15, fontWeight: 700,
                cursor: "pointer", width: "100%", maxWidth: 340
              }}>
                Back to Home
              </button>
            </div>
          </div>
        );
      }

      return (
        <div style={styles.container}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "4px 0 12px" }}>
            <div>
              <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0, color: "#fff" }}>{"\u{1F525}"} Heater</h2>
              <p style={{ fontSize: 11, color: "#666", margin: "2px 0 0" }}>April 7 {"\u2022"} Active Hitting Streaks</p>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 12, color: "#888" }}>{"\u{1F6E1}"} 1 Save</span>
            </div>
          </div>

          <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
            {[
              { key: "all", label: "All Streaks" },
              { key: "hot", label: "\u{1F525} Hot (6+)" },
              { key: "warm", label: "Warming Up" }
            ].map(f => (
              <button key={f.key} onClick={() => setFilter(f.key)} style={{
                padding: "6px 12px", borderRadius: 8, fontSize: 12, fontWeight: 600, cursor: "pointer",
                border: filter === f.key ? "1px solid #f59e0b" : "1px solid #333",
                background: filter === f.key ? "rgba(245,158,11,0.1)" : "#1a1a1a",
                color: filter === f.key ? "#f59e0b" : "#888"
              }}>
                {f.label}
              </button>
            ))}
          </div>

          {filteredStreaks.map((p, realIdx) => {
            const origIdx = STREAKS.indexOf(p);
            return (
              <StreakCard
                key={origIdx}
                player={p}
                isExpanded={expanded === origIdx}
                onToggle={() => setExpanded(expanded === origIdx ? null : origIdx)}
                bet={bets[origIdx]}
                onBet={(pick) => {
                  setBets(prev => {
                    const next = { ...prev };
                    if (next[origIdx] === pick) { delete next[origIdx]; }
                    else { next[origIdx] = pick; }
                    return next;
                  });
                }}
              />
            );
          })}

          {betCount > 0 && (
            <div style={{
              position: "fixed", bottom: 0, left: 0, right: 0,
              padding: "16px", background: "linear-gradient(transparent, #0d0d0d 30%)",
              display: "flex", justifyContent: "center"
            }}>
              <button onClick={() => setView("confirmed")} style={{
                background: "#f59e0b", color: "#000", border: "none", borderRadius: 12,
                padding: "15px 0", fontSize: 16, fontWeight: 700, cursor: "pointer",
                width: "100%", maxWidth: 400
              }}>
                Lock In {betCount} Pick{betCount > 1 ? "s" : ""} {"\u{1F512}"}
              </button>
            </div>
          )}
        </div>
      );
    }

    const styles = {
      container: {
        minHeight: "100vh", background: "#0d0d0d", color: "#fff",
        fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
        maxWidth: 430, margin: "0 auto", padding: "14px 16px 100px",
        position: "relative", overflowX: "hidden"
      }
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Heater />);
  </script>
</body>
</html>
